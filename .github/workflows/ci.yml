name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install deps
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Mypy
        run: uv run mypy src/edareport/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install deps
        run: uv sync --extra dev
      - name: Run tests (unit only, skip slow)
        run: uv run pytest -m "not slow" --cov=edareport --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
        continue-on-error: true  # jangan block CI kalau codecov down

  benchmark:
    name: Benchmark (scheduled)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[bench]')
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - name: Run benchmark tests
        run: uv run pytest -m benchmark -v --no-cov
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .benchmark/

  # Jadwal harian untuk benchmark otomatis
  # Uncomment setelah v0.1 release:
  # on:
  #   schedule:
  #     - cron: "0 2 * * *"  # 02:00 UTC setiap hari

benchmark-regression:
    name: Benchmark regression guard
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - name: Run benchmark
        run: |
          uv run python -c "
          import pandas as pd, numpy as np, time, sys
          from edareport.profiler.core import DataFrameProfiler

          rng = np.random.default_rng(42)
          df = pd.DataFrame({
              'a': rng.normal(0, 1, 100_000),
              'b': rng.exponential(2, 100_000),
              'c': rng.integers(0, 1000, 100_000).astype(float),
              'd': np.random.choice(list('ABCDE'), 100_000),
          })

          profiler = DataFrameProfiler()
          profiler.profile(df.head(100))  # warmup

          times = []
          for _ in range(3):
              start = time.perf_counter()
              profiler.profile(df)
              times.append(time.perf_counter() - start)

          avg = sum(times) / len(times)
          print(f'100k rows avg: {avg:.3f}s')

          # Regression threshold: 15s (non-negotiable target)
          if avg > 15.0:
              print(f'REGRESSION: {avg:.3f}s > 15s threshold')
              sys.exit(1)
          print('PASS')
          "
